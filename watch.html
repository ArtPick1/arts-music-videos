<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Holy Noise — Videos</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      --bg: #000;
      --fg: #f2f2f2;
      --muted: #bdbdbd;
      --card: #0c0c0c;
      --border: #222;
      --red: #ff0000;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      line-height: 1.55;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 14px 16px 44px;
    }
    .site-header {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #000;
    }
    
    .tagline{
      margin: 10px 0 0;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .2px;
    }
.top {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin: 14px 0;
    }
    .btn {
      display: inline-block;
      padding: 12px 16px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 800;
      border: 1px solid var(--border);
      background: #111;
      color: var(--fg);
    }
    .btn:hover { filter: brightness(1.07); }
    .btn-youtube {
      background: var(--red);
      border-color: #7a0000;
      color: #fff;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
    }
    .thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      border: 1px solid var(--border);
      display: block;
      background: #000;
      object-fit: cover;
    }
    .title {
      margin: 10px 0 6px;
      font-weight: 900;
    }
    .small { font-size: 13px; color: var(--muted); }
    .search {
      flex: 1;
      min-width: 220px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0a0a0a;
      color: var(--fg);
      outline: none;
    }
  </style>

  <link rel="icon" type="image/png" href="favicon-32.png">
  <link rel="icon" href="favicon.ico">
  <meta name="theme-color" content="#000000">
</head>
<body>
  <div class="wrap">
    <a href="index.html?vHN2602250303"><img class="site-header" src="images/holy-noise-site-header-1920x300.webp" alt="Holy Noise header" />
    <div class="tagline">Music videos + a message worth reading.</div>
</a>

    <div class="top">
      <a class="btn" href="index.html?vHN2602250303">Home</a>
      <a class="btn btn-youtube" href="https://www.youtube.com/@artpick4259/featured" target="_blank" rel="noopener">Watch on YouTube</a>
      <input id="q" class="search" type="search" placeholder="Search videos…" />
    </div>

    <div id="grid" class="grid"></div>
  </div>

  <script src="videos.js?vHN2602250303"></script>
  <script>
    const grid = document.getElementById('grid');
    const q = document.getElementById('q');

    function thumbUrl(id) {
      return `https://i.ytimg.com/vi/${id}/hqdefault.jpg`;
    }

    function render(list) {
      grid.innerHTML = "";
      for (const v of list) {
        const card = document.createElement('div');
        card.className = "card";

        const a = document.createElement('a');
        a.href = `https://youtu.be/${v.youtubeId}`;
        a.target = "_blank";
        a.rel = "noopener";

        const img = document.createElement('img');
        img.className = "thumb";
        img.loading = "lazy";
        img.src = thumbUrl(v.youtubeId);
        img.alt = v.title;

        a.appendChild(img);

        const t = document.createElement('div');
        t.className = "title";
        t.textContent = v.title;

        const open = document.createElement('a');
        open.className = "btn btn-youtube";
        open.style.display = "inline-block";
        open.style.marginTop = "10px";
        open.href = `https://youtu.be/${v.youtubeId}`;
        open.target = "_blank";
        open.rel = "noopener";
        open.textContent = "Watch";

        card.appendChild(a);
        card.appendChild(t);
        if (v.message) {
          const m = document.createElement('div');
          m.className = "small";
          m.textContent = v.message;
          card.appendChild(m);
        }
        card.appendChild(open);

        grid.appendChild(card);
      }
    }

    const all = window.VIDEOS || [];
    render(all);

    q.addEventListener('input', () => {
      const term = q.value.trim().toLowerCase();
      if (!term) return render(all);
      render(all.filter(v =>
        (v.title || "").toLowerCase().includes(term) ||
        (v.tags || []).join(" ").toLowerCase().includes(term) ||
        (v.message || "").toLowerCase().includes(term)
      ));
    });
  </script>
</body>
</html>
